<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Kino Live</title>
<style>
  body { font-family: sans-serif; padding: 20px; }
  #balls { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 20px; }
  .ball { width: 40px; height: 40px; border-radius: 50%; background: red; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 16px; transition: transform 0.3s; }
  .show { opacity: 1; }
  .user-played { background: blue !important; }
  .pulse { animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
  #input-numbers { margin-top: 20px; }
  #input-numbers input { width: 40px; margin-right: 5px; text-align: center; }
</style>
</head>
<body>

<h1>Kino Live</h1>

<div id="input-numbers">
  <label>Numerele tale (max 20):</label>
  <input type="text" id="num1"><input type="text" id="num2">
  <input type="text" id="num3"><input type="text" id="num4">
  <input type="text" id="num5"><input type="text" id="num6">
  <input type="text" id="num7"><input type="text" id="num8">
  <button id="save">Salvează</button>
</div>

<div id="balls"></div>

<script>
let userNumbers = [];

// Salvăm numerele jucate
document.getElementById("save").addEventListener("click", () => {
  const inputs = document.querySelectorAll("#input-numbers input");
  userNumbers = [];
  inputs.forEach(input => {
    const val = input.value.trim();
    if (val) userNumbers.push(val.padStart(2,'0'));
  });
  // trimitem la backend
  fetch('/set-user-numbers', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ numbers: userNumbers })
  });
  console.log("Numere jucate actualizate:", userNumbers);
});

// Functie pentru a afișa bilele
function showBalls(draw) {
  const container = document.getElementById("balls");
  container.innerHTML = "";
  draw.numbers.forEach(num => {
    const ball = document.createElement("div");
    ball.classList.add("ball", "show");

    // dacă numărul este jucat de tine
    if (userNumbers.includes(num)) ball.classList.add("user-played");

    // dacă numărul apare de 3 ori în ultimele 3 extrageri, pulse
    let count = 0;
    draw.recent.forEach(d => {
      if (d.includes(num)) count++;
    });
    if (count >= 3) ball.classList.add("pulse");

    ball.textContent = num;
    container.appendChild(ball);
  });
}

// Preluare ultimele extrageri
async function fetchDraws() {
  try {
    const res = await fetch("/kino");
    const data = await res.json();
    if (!data.lastDraws || data.lastDraws.length === 0) return;

    const latest = data.lastDraws[0];
    const recent = data.lastDraws.slice(1,4).map(d => d.numbers);
    showBalls({ numbers: latest.numbers, recent });
  } catch(e) {
    console.error("Error fetching draws:", e);
  }
}

// Actualizare la fiecare 10 secunde
fetchDraws();
setInterval(fetchDraws, 10 * 1000);
</script>

</body>
</html>
