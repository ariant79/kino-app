<!doctype html>
<html>
  <head>
    <title>KINO LIVE – Mingi TV cu Numere Jucate</title>
    <style>
      body {
        background: #0b0b0b;
        color: white;
        font-family: Arial, sans-serif;
        text-align: center;
      }

      h1 {
        margin-top: 20px;
      }

      #userNumbersInput {
        margin-top: 20px;
        padding: 8px;
        width: 300px;
        font-size: 16px;
        border-radius: 5px;
        border: none;
        text-align: center;
      }

      #userNumbersFeedback {
        margin-top: 10px;
        color: #00f;
        font-weight: bold;
      }

      #numbers {
        margin-top: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      .draw {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-bottom: 30px;
        flex-direction: column;
        align-items: center;
      }

      .draw-time {
        color: #ffd700;
        margin-bottom: 10px;
        font-size: 18px;
        font-weight: bold;
      }

      .balls-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
      }

      .ball {
        width: 60px;
        height: 60px;
        margin: 8px;
        border-radius: 50%;
        background: #e91e63; /* culoare implicită bile normale */
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-size: 22px;
        color: white;
        transform: translateY(-200px) scale(0);
        opacity: 0;
        transition: all 0.5s cubic-bezier(0.68, -0.55, 0.27, 1.55);
      }

      .ball.show {
        transform: translateY(0) scale(1);
        opacity: 1;
      }

      /* Numerele tale */
      .user-played {
        background: #2196f3 !important;
        color: white !important;
        box-shadow: 0 0 20px #2196f3 !important;
      }

      V/* HOT numbers – pulse puternic */
      .hot-number {
        animation: pulse-strong 0.5s infinite alternate;
        box-shadow:
          0 0 10px #fff,
          0 0 20px #ff0000,
          0 0 30px #ff0000;
      }

      /* Dacă e și jucat + hot → combină efectele */
      .user-played.hot-number {
        box-shadow:
          0 0 20px #2196f3,
          0 0 30px #ff0000;
      }

      /* Numere repetate doar pulsează */
      .repeated {
        animation: pulse 1s infinite alternate;
      }

      @keyframes bounce {
        0% {
          transform: translateY(-200px) scale(0);
        }
        60% {
          transform: translateY(-20px) scale(1.2);
        }
        80% {
          transform: translateY(0px) scale(1.1);
        }
        100% {
          transform: translateY(0px) scale(1);
        }
      }

      @keyframes pulse {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.15);
        }
      }

      /* animație */
      @keyframes pulse-strong {
        0% {
          transform: scale(1);
        }
        100% {
          transform: scale(1.3);
        }
      }
    </style>
  </head>
  <body>
    <h1>🎰 KINO LIVE</h1>

    <input
      type="text"
      id="userNumbersInput"
      placeholder="Introdu 8 numere separate prin virgulă"
    />
    <div id="userNumbersFeedback"></div>

    <div id="numbers"></div>

    <script>
      let lastDraw = [];
      let lastDrawsHistory = [];
      let userNumbers = new Set();

      function updateUserNumbers() {
        const input = document.getElementById("userNumbersInput").value;
        const nums = input
          .split(",")
          .map((n) => parseInt(n.trim()))
          .filter((n) => !isNaN(n) && n >= 1 && n <= 80)
          .slice(0, 8);
        userNumbers = new Set(nums);
        console.log("Numere jucate actualizate:", Array.from(userNumbers));
        document.getElementById("userNumbersFeedback").innerText =
          "Numere jucate: " + Array.from(userNumbers).join(", ");
      }

      async function getData() {
        const res = await fetch("http://localhost:3000/kino");
        const data = await res.json();

        if (
          JSON.stringify(data.numbers) !== JSON.stringify(lastDraw) &&
          data.numbers.length === 20
        ) {
          animateDraw(data);
          lastDraw = data.numbers;
        }
      }

      async function animateDraw(draw) {
        // ✨ Asigurăm citirea numerelor jucate chiar acum
        updateUserNumbers();

        const container = document.getElementById("numbers");
        const drawDiv = document.createElement("div");
        drawDiv.className = "draw";

        const timeEl = document.createElement("div");
        timeEl.className = "draw-time";
        timeEl.innerText = `Ora extragerii: ${draw.time}`;
        drawDiv.appendChild(timeEl);

        const ballsContainer = document.createElement("div");
        ballsContainer.className = "balls-container";
        drawDiv.appendChild(ballsContainer);

        container.prepend(drawDiv);

        // Selectează toate bilele
        document.querySelectorAll(".ball").forEach((b) => {
          if (b.classList.contains("user-played")) {
            console.log("Bila jucată:", b.innerText);
          }
        });

        // Contorizăm aparițiile în ultimele 5 extrageri
        let counts = {};
        lastDrawsHistory.slice(0, 5).forEach((hist) => {
          hist.forEach((n) => {
            n = Number(n);
            counts[n] = (counts[n] || 0) + 1;
          });
        });

        for (let i = 0; i < draw.numbers.length; i++) {
          const num = Number(draw.numbers[i]);

          const ball = document.createElement("div");
          ball.className = "ball";
          ball.innerText = num;

          const isUser = userNumbers.has(num);
          const isHot = counts[num] >= 3;

          // 🔵 PRIORITATE: numerele tale
          if (isUser) {
            ball.classList.add("user-played");
          }

          // 🔥 HOT numbers (pulse)
          if (isHot) {
            ball.classList.add("hot-number");
            console.log("🔥 HOT:", num, "count:", counts[num]);
          }

          ballsContainer.appendChild(ball);

          await sleep(1000); // așteaptă 1 secundă între afișarea fiecărei bile
          ball.classList.add("show");
        }

        lastDrawsHistory.unshift(draw.numbers.slice());
        if (lastDrawsHistory.length > 5) lastDrawsHistory.pop();

        // Limitează afișarea la ultimele 5 extrageri
        while (container.children.length > 5)
          container.removeChild(container.lastChild);
      }

      function sleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      setInterval(getData, 3000);
      getData();
    </script>
  </body>
</html>
