<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>Kino Live</title>
<style>
body { font-family: sans-serif; background: #111; color: #fff; text-align: center; }
h1 { margin-top: 20px; }
.draw { margin: 20px auto; }
.ball {
  display: inline-block;
  width: 40px;
  height: 40px;
  line-height: 40px;
  border-radius: 50%;
  margin: 5px;
  background: red;
  color: #fff;
  font-weight: bold;
  font-size: 18px;
  transition: transform 0.3s;
}
.ball.show { transform: scale(1.2); }
.ball.pulse {
  animation: pulse 1s infinite;
}
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}
.ball.user-played { background: blue !important; }
#userNumbers { width: 300px; margin-top: 10px; font-size: 16px; }
</style>
</head>
<body>

<h1>Kino Live</h1>

<input type="text" id="userNumbers" placeholder="Introdu numerele tale, separate prin ,">
<button id="saveNumbers">Salveaza</button>

<div id="draws"></div>

<script>
const API = "https://kino-app-mplj.onrender.com";
let userNumbers = [];

// salvare numere jucate
document.getElementById("saveNumbers").onclick = () => {
  const val = document.getElementById("userNumbers").value;
  userNumbers = val.split(",").map(n => n.trim());
  fetch(`${API}/user-numbers`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ numbers: userNumbers })
  });
};

// afișare extrageri
async function loadDraws() {
  try {
    const res = await fetch(`${API}/kino`);
    const data = await res.json();
    const drawsDiv = document.getElementById("draws");
    drawsDiv.innerHTML = "";

    // contorizare apariții pentru pulse (≥3 in ultimele 5)
    const countMap = {};
    data.lastDraws.forEach(d => d.numbers.forEach(n => countMap[n] = (countMap[n]||0)+1));

    data.lastDraws.forEach(draw => {
      const div = document.createElement("div");
      div.classList.add("draw");
      div.innerHTML = `<strong>${draw.time}</strong><br>`;
      draw.numbers.forEach(n => {
        const span = document.createElement("span");
        span.classList.add("ball", "show");
        if (userNumbers.includes(n)) span.classList.add("user-played");
        if (countMap[n] >= 3) span.classList.add("pulse");
        span.textContent = n;
        div.appendChild(span);
      });
      drawsDiv.appendChild(div);
    });
  } catch(e) {
    console.error(e);
  }
}

// update periodic
loadDraws();
setInterval(loadDraws, 5000);
</script>

</body>
</html>
