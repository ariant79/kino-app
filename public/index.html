<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<title>KINO LIVE TV</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    background: radial-gradient(circle at center, #111 0%, #000 100%);
    font-family: Arial, sans-serif;
    color: white;
}

/* TITLU */
h1 {
    text-align: center;
    margin: 20px 0;
}

/* INPUT */
#controls {
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
}

#userInput {
    width: 420px;
    padding: 10px;
    border-radius: 10px;
    border: none;
    font-size: 16px;
    text-align: center;
}

/* CONTAINER */
#main {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* DRAW */
.draw {
    margin-bottom: 40px;
    text-align: center;
}

.draw-time {
    color: #FFD700;
    font-weight: bold;
    margin-bottom: 15px;
    font-size: 18px;
}

/* BILE */
.row {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.history {
    opacity: 0.7;
    transform: scale(0.85);
}

.draw:first-child {
    transform: scale(1);
}

.draw:not(:first-child) {
    transform: scale(0.85);
    opacity: 0.7;
}

/* BALL */
.ball {
    width: 65px;
    height: 65px;
    border-radius: 50%;
    background: linear-gradient(145deg, #ff2a6d, #e91e63);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 0 15px rgba(255,0,100,0.6);

    transform: translateY(-40px) scale(0);
    opacity: 0;
    transition: all 0.4s ease;
}

.ball.show {
    transform: translateY(0) scale(1);
    opacity: 1;
}

/* NUMERELE TALE */
.user {
    background: linear-gradient(145deg, #2196f3, #1e88e5) !important;
    box-shadow: 0 0 20px rgba(33,150,243,0.9) !important;
    animation: pulseUser 1s infinite alternate;
}

@keyframes pulseUser {
    from { transform: scale(1); }
    to { transform: scale(1.2); }
}
</style>
</head>

<body>

<h1>🎰 KINO LIVE</h1>

<div id="controls">
  <input id="userInput" placeholder="Introdu numerele tale (ex: 1, 5, 23, 44...)" />
</div>

<div id="main"></div>

<script>
let lastKey = "";
let userNumbers = new Set();

/* INPUT NUMERE */
document.getElementById("userInput").addEventListener("input", () => {
    const val = document.getElementById("userInput").value;

    const nums = val.split(",")
        .map(n => parseInt(n.trim()))
        .filter(n => !isNaN(n) && n >= 1 && n <= 80);

    userNumbers = new Set(nums.map(n => n.toString().padStart(2, "0")));
});

/* CREATE ROW */
function createRow(numbers, isHistory=false) {
    const row = document.createElement("div");
    row.className = "row" + (isHistory ? " history" : "");

    numbers.forEach(num => {
        const ball = document.createElement("div");
        ball.className = "ball";
        ball.textContent = num;

        if (userNumbers.has(num)) {
            ball.classList.add("user");
        }

        row.appendChild(ball);
    });

    return row;
}

/* ANIMAȚIE */
async function animate(row) {
    const balls = row.querySelectorAll(".ball");

    for (let i = 0; i < balls.length; i++) {
        await new Promise(r => setTimeout(r, 1000));
        balls[i].classList.add("show");
    }
}

/* RENDER DRAW */
async function renderDraw(draw, isMain=false) {
    const div = document.createElement("div");
    div.className = "draw";

    const time = document.createElement("div");
    time.className = "draw-time";
    time.textContent = draw.time;

    const row = createRow(draw.numbers, !isMain);

    div.appendChild(time);
    div.appendChild(row);

    return { div, row };
}

/* FETCH */
async function loadData() {
    try {
        const res = await fetch("/kino");
        const data = await res.json();

        const newest = data.history[0];

        // verifică dacă extragerea e deja pe ecran
        const key = newest.time + JSON.stringify(newest.numbers);
        if (key === lastKey) return;

        lastKey = key;

        const container = document.getElementById("main");

        /* 🔝 creează extragerea nouă */
        const newDraw = await renderDraw(newest, true);

        // adaugă sus fără să ștergi restul
        container.prepend(newDraw.div);

        // animare doar pentru cea nouă
        await animate(newDraw.row);

        /* 🔽 limitează la 5 extrageri */
        while (container.children.length > 5) {
            container.removeChild(container.lastChild);
        }

    } catch (err) {
        console.error("Fetch error:", err);
    }
}


setInterval(loadData, 5000);
loadData();
</script>

</body>
</html>
